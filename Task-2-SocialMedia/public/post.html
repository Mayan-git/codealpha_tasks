<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post — MiniSocial</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar"><div id="navbar"></div></nav>

  <div class="container">
    <a href="index.html" class="muted">&larr; Back to feed</a>

    <div class="card" id="postCard" style="margin-top:14px;">
      <div class="spinner-row">Loading post...</div>
    </div>

    <div class="card" id="commentsCard" style="display:none;">
      <h2 style="font-size:1rem;">Comments</h2>
      <div class="comment-form">
        <textarea id="commentInput" placeholder="Write a comment..." maxlength="500"></textarea>
        <button class="btn" id="commentBtn">Reply</button>
      </div>
      <p class="error" id="commentError"></p>
      <div id="commentsList"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/post-render.js"></script>
  <script src="js/post.js"></script>
</body>
</html>
