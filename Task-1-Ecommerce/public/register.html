<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — ShopEasy</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="nav-root"></div>

  <main>
    <div class="form-card">
      <h1 class="text-center">Create an Account</h1>
      <div id="alert-area"></div>
      <form id="register-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" minlength="6" required />
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" minlength="6" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Register</button>
      </form>
      <p class="form-footnote">Already have an account? <a href="login.html">Login</a></p>
    </div>
  </main>

  <footer class="site-footer">ShopEasy &mdash; Basic e-commerce demo</footer>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
